# nginx site for boltzmaker.mdeller.com. provision.sh substitutes __SERVER_NAME__ and
# __BIND_ADDR__ and installs this to /etc/nginx/sites-available/boltzmaker, then
# certbot --nginx adds the TLS bits (and provision.sh's own idempotent patch adds
# http2 afterward, since certbot on nginx 1.24 never does).
#
# limit_req_zone must live at the `http` context, not inside `server {}` -- since this
# whole file is `include`d from sites-enabled inside the droplet's shared http{} block,
# declaring it here at file scope (outside the server block below) lands in the right
# place. Named uniquely (`boltzmaker`) so it can't collide with another vhost's own zone.
limit_req_zone $binary_remote_addr zone=boltzmaker:10m rate=6r/m;

server {
    listen 80;
    listen [::]:80;
    server_name __SERVER_NAME__;

    location /static/ {
        alias /opt/boltzmaker/web/static/;
        # Uses the droplet's shared long-cache snippet (installed by mdeller-landing's
        # own deploy.sh --provision) rather than repeating the header inline -- confirm
        # /etc/nginx/snippets/long-cache.conf exists before the first provision.sh run;
        # if this include fails, either install that snippet first or fall back to the
        # explicit header AlphaFraud's own nginx conf uses.
        include snippets/long-cache.conf;
    }

    # Uploads can be up to 200MB (MAX_CONTENT_LENGTH in boltzmaker_web/app.py -- these
    # two MUST stay in sync, a mismatch produces a confusing raw connection reset
    # instead of Flask's clean 413) and can take minutes to fully receive over a slow
    # link, so both the body-receive and proxy timeouts are raised well past nginx's
    # defaults (and past AlphaFraud's own 90s, which is tuned for a small dashboard,
    # not a multi-target campaign zip).
    client_max_body_size 200m;
    client_body_timeout 300s;

    location /generate  { limit_req zone=boltzmaker burst=3 nodelay; proxy_pass http://__BIND_ADDR__; include snippets/boltzmaker-proxy.conf; }
    location /preflight { limit_req zone=boltzmaker burst=3 nodelay; proxy_pass http://__BIND_ADDR__; include snippets/boltzmaker-proxy.conf; }
    location /analyze   { limit_req zone=boltzmaker burst=3 nodelay; proxy_pass http://__BIND_ADDR__; include snippets/boltzmaker-proxy.conf; }

    location / {
        proxy_pass http://__BIND_ADDR__;
        include snippets/boltzmaker-proxy.conf;
    }
}
