# Shared proxy-header block for every location in nginx-boltzmaker.conf that proxies to
# gunicorn -- installed by provision.sh to /etc/nginx/snippets/boltzmaker-proxy.conf.
# Not one of the droplet's existing shared snippets (those are long-cache.conf for
# static assets); this one is boltzmaker-specific since its proxy_read_timeout (300s,
# for `analyze`'s subprocess cost) is much longer than AlphaFraud's own 90s.
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_read_timeout 300s;
proxy_send_timeout 300s;
